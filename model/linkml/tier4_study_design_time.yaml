id: https://sagebionetworks.org/classic/tier4
name: classic_tier4_study_design_time
title: Study Design & Time
description: >-
  Tier 4 — Describe when and how often data were collected (longitudinal
  structure, bursts, waves, follow-up intervals, timestamp availability). This is
  key for interpretation and longitudinal/APC use cases.

prefixes:
  classic: https://sagebionetworks.org/classic/
default_prefix: classic
default_range: string

imports:
  - classic_core   # all enums are defined here and may be reused by any tier

classes:
  StudyDesignTime:
    title: Study Design & Time
    description: Tier 4 record — temporal coverage, study structure, and sampling design.
    todos:
      - add validation rules (uncomment the `rules:` template below)
    # --- VALIDATION RULES placeholder (class-level conditional logic) ---
    # rules:
    #   - preconditions:
    #       slot_conditions:
    #         <slot>: {equals_string: <value>}
    #     postconditions:
    #       slot_conditions:
    #         <slot>: {required: true}
    #     description: <why this rule exists>
    #   # e.g. collectionModality = Digital  =>  deviceType required
    mixins:
      - StudyAnchored
      - ScopedRecord
    slots:
      - temporalCoverage
      - startYear
      - endYear
      - years
      - seasons
      - temporalCoverageDescription
      - enrollmentAge
      - enrollmentTimepoint
      - administrationContext
      - collectionModality
      - recruitmentWave
      - studyWaves
      - studyWaveID
      - studyPeriodID
      - studyArmID
      - studyComponentID
      - studyComponentType
      - followUpYear
      - followUpYearDescription
      - administrationMode
      - promptingScheduleType
      - promptFrequency
      - responseWindowMinutes
      - rollingEnrollment
      - studyStartYear
      - burstDesign
      - numberOfBursts
      - burstLengthValue
      - burstLength
      - burstFrequency
      - followUpIntervalValue
      - followUpInterval
      - hasObservationTimestamp

slots:
  temporalCoverage:
    title: temporalCoverage
    description: >-
      The time period or periods during which data were collected for a study,
      cohort, or variable, summarized at an aggregate level.
  startYear:
    title: startYear
    description: Earliest calendar year of data collection.
  endYear:
    title: endYear
    description: Latest calendar year of data collection.
  years:
    title: years
    description: Explicit list of years, if non-continuous. Four-digit integers (e.g., 2019).
  seasons:
    title: seasons
    description: Seasons during which data were collected.
    range: seasons_enum
  temporalCoverageDescription:
    title: temporalCoverageDescription
    description: Free-text clarification (optional).
  enrollmentAge:
    title: enrollmentAge
    description: >-
      The age or ages of a participant at the time of enrollment or at defined
      enrollment-related timepoints in a study, including single ages, age ranges,
      or multiple ages associated with longitudinal or staged enrollment.
  enrollmentTimepoint:
    title: enrollmentTimepoint
    description: A named study milestone at which enrollment occurs (e.g., baseline, re-enrollment, extension phase).
  administrationContext:
    title: administrationContext
    description: >-
      The physical or situational setting in which a data collection activity or
      assessment is administered. Describes where data collection occurs, not how,
      who, or what. Intended for general or summary-level reporting, not
      per-participant metadata.
  collectionModality:
    title: collectionModality
    description: The primary mode by which data were collected for a variable or assessment.
    range: collection_modality_enum
  recruitmentWave:
    title: recruitmentWave
    description: >-
      Enrollment wave (baseline, follow-up, etc.). Identifies the recruitment phase
      or wave during which participants were enrolled in a study, reflecting
      distinct enrollment periods defined by study design or operational milestones.
    range: study_wave_enum
  studyWaves:
    title: studyWaves
    description: The recruitment or enrollment wave(s) represented in the study population.
    range: study_wave_enum
  studyWaveID:
    title: studyWaveID
    description: >-
      A stable identifier for a defined recruitment wave or enrollment phase within
      a study. Examples: WAVE:1, WAVE:2, WAVE:PILOT, WAVE:EXTENSION
  studyPeriodID:
    title: studyPeriodID
    description: >-
      A stable identifier for a defined time period during which data collection
      occurred under consistent procedures or conditions. Examples: PERIOD:BASELINE,
      PERIOD:FOLLOWUP_6MO, PERIOD:COVID_ERA, PERIOD:2020_2021
  studyArmID:
    title: studyArmID
    description: >-
      A stable identifier for a defined study arm, group, or condition assignment
      used to structure participant enrollment, intervention, or comparison.
      Examples: ARM:CONTROL, ARM:TREATMENT_A, ARM:HIGH_RISK, ARM:CASE, ARM:COMPARATOR
  studyComponentID:
    title: studyComponentID
    description: >-
      A stable identifier for a defined component of a study (e.g., wave, arm,
      period) used to scope metadata summaries.
  studyComponentType:
    title: studyComponentType
    description: >-
      The category of study subcomponent identified by studyComponentID (e.g., wave,
      arm, period), used to indicate what kind of study structure the component
      represents for scoping metadata summaries.
    range: study_component_type_enum
  followUpYear:
    title: followUpYear
    description: >-
      Years since original cohort enrollment. Summarizes the amount of time elapsed
      since original cohort enrollment for which participant data are available.
      Values can be in: minYears, maxYears, years.
  followUpYearDescription:
    title: followUpYearDescription
    description: Free-text clarification (optional).
  administrationMode:
    title: administrationMode
    description: The manner in which a digital assessment or data collection activity is administered to participants.
    range: administration_mode_enum
  promptingScheduleType:
    title: promptingScheduleType
    description: "EMA schedule type. Valid values: free text, OR Multiple, Varies, Unknown"
  promptFrequency:
    title: promptFrequency
    description: "Frequency of prompts. Valid values: free text, OR Multiple, Varies, Unknown"
  responseWindowMinutes:
    title: responseWindowMinutes
    description: "Response window (minutes). Valid values: free text, OR Multiple, Varies, Unknown."
  rollingEnrollment:
    title: rollingEnrollment
    description: >-
      Indicates whether participant enrollment occurs continuously over time rather
      than within a fixed recruitment window.
    range: rolling_enrollment_enum
  studyStartYear:
    title: studyStartYear
    description: >-
      The calendar year in which study recruitment or data collection began. Use
      "Unknown" if not available.
  burstDesign:
    title: burstDesign
    description: >-
      A summary description of the study's burst-based sampling structure (bursts,
      timing, follow-up cadence, and recruitment waves).
  numberOfBursts:
    title: numberOfBursts
    description: The number of distinct burst periods of intensive measurement scheduled per participant.
  burstLengthValue:
    title: burstLengthValue
    description: The numeric value of the planned duration of each burst period.
  burstLength:
    title: burstLength
    description: The planned duration of each burst period of intensive measurement.
    range: burst_length_enum
  burstFrequency:
    title: burstFrequency
    description: The planned frequency at which bursts occur across the study timeline.
    range: burst_frequency_enum
  followUpIntervalValue:
    title: followUpIntervalValue
    description: The numeric value of the planned amount of time between participant follow-up assessments.
  followUpInterval:
    title: followUpInterval
    description: >-
      The planned amount of time between participant follow-up assessments, visits,
      or measurement periods.
    range: follow_up_interval_enum
  hasObservationTimestamp:
    title: hasObservationTimestamp
    description: Indicates whether individual observations/records include a date or timestamp of data collection.
    range: yes_no_partial_unknown_enum
