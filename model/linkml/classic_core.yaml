id: https://sagebionetworks.org/classic/core
name: classic_core
title: CLASSIC Core
description: >-
  Shared building blocks for the CLASSIC tiered metadata model: prefixes, types,
  cross-tier slots, mixins, and ALL controlled-vocabulary enums. Enums live here
  (not in the tier files) so any enum can be reused by any tier and new enums can
  be added in one place. Each tier schema imports this file.
license: https://creativecommons.org/publicdomain/zero/1.0/

prefixes:
  linkml: https://w3id.org/linkml/
  classic: https://sagebionetworks.org/classic/
  schema: http://schema.org/
  # --- Ontology / vocabulary prefixes (declared and ready for term mapping) ---
  PATO: http://purl.obolibrary.org/obo/PATO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  OBI: http://purl.obolibrary.org/obo/OBI_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  DUO: http://purl.obolibrary.org/obo/DUO_
  UO: http://purl.obolibrary.org/obo/UO_
  EDAM: http://edamontology.org/
  SNOMEDCT: http://purl.bioontology.org/ontology/SNOMEDCT/
  SIO: http://semanticscience.org/resource/SIO_
default_prefix: classic
default_range: string

imports:
  - linkml:types

# ===================================================================== #
# ONTOLOGY MAPPING & VALIDATION CONVENTIONS  (read before curating)
# ---------------------------------------------------------------------
# Ontology mappings use NATIVE LinkML constructs. On each enum
# permissible value, replace the `todos:` placeholder with `meaning:`
# (and a `description:`) once a term is chosen — following the LinkML
# docs pattern:
#
#   enums:
#     PersonStatus:
#       permissible_values:
#         ALIVE:
#           description: the person is living
#           meaning: PATO:0001421
#         DEAD:
#           description: the person is deceased
#           meaning: PATO:0001422
#         UNKNOWN:
#           description: the vital status is not known
#           todos:
#             - map this to an ontology
#
# Slots/classes may also carry `todos:` (free-text) and mapping slots:
#   slot_uri: NCIT:C93499
#   exact_mappings:   [NCIT:C25190]
#   close_mappings:   [OBI:0001622]
#   related_mappings: [SIO:000115]
#
# VALIDATION RULES (replace the `add validation rule` todos):
#   required: true | recommended: true
#   pattern: "^STUDY_[A-Z0-9]+$"
#   minimum_value: 1900 | maximum_value: 2100
#   # class-level conditional logic:
#   # rules:
#   #   - preconditions: {slot_conditions: {collectionModality: {equals_string: Digital}}}
#   #     postconditions: {slot_conditions: {deviceType: {required: true}}}
#   #     description: Digital collection requires a deviceType.
# ===================================================================== #

#-------------------------------------------------------------------#
# Mixins — composed into each tier's record class
#-------------------------------------------------------------------#
classes:
  StudyAnchored:
    mixin: true
    description: Anchors any record to its parent study via the stable studyID.
    slots:
      - studyID

  ScopedRecord:
    mixin: true
    description: >-
      Optional per-row identity plus the scope qualifiers shared by every
      non-Tier-1 record: what the value applies to and at what aggregation level.
    slots:
      - optional_row_identifier
      - optional_row_identifier_value
      - appliesTo
      - aggregationLevel
      - populationScope

#-------------------------------------------------------------------#
# Shared slots
#-------------------------------------------------------------------#
slots:
  studyID:
    title: studyID
    description: >-
      The stable, unique identifier for a study that never changes, even if other
      study metadata changes (like the study name, short name, owner, or project).
      Example: STUDY_SCA
    identifier: true
    required: true
    todos:
      - map this to an ontology
      - add validation rule (e.g. pattern "^STUDY_[A-Z0-9]+$")

  cohortID:
    title: cohortID
    description: Unique identifier for the cohort.
    todos:
      - map this to an ontology

  optional_row_identifier:
    title: optional persistent row identifier
    description: >-
      Use studyID as the anchor, plus a persistent row identifier to identify a
      specific file/version, etc.
    range: persistent_row_identifier_enum

  optional_row_identifier_value:
    title: optional persistent row identifier - value
    description: Enter a unique identifier for the selection made.

  appliesTo:
    title: appliesTo
    description: >-
      Indicates the level of entity to which a metadata value applies (e.g.,
      individual participant or population summary).
    range: applies_to_enum

  aggregationLevel:
    title: aggregationLevel
    description: >-
      Specifies whether a metadata value represents individual-level data or an
      aggregate summary.
    range: aggregation_level_enum

  populationScope:
    title: populationScope
    description: >-
      Identifies the population described by the metadata (e.g., study-wide,
      cohort, or study arm).
    range: population_scope_enum

